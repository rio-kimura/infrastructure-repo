---
# -----------------------------------------------------
# 1. Prometheus の導入 (Binary Install)
# -----------------------------------------------------
- name: "Prometheus 用ユーザーの作成"
  ansible.builtin.user:
    name: prometheus
    shell: /sbin/nologin
    system: yes
    create_home: no

- name: "Prometheus バイナリの展開"
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: /tmp/prometheus-2.51.0.linux-amd64

- name: "Prometheus 実行ファイルの配置"
  ansible.builtin.copy:
    src: "/tmp/prometheus-2.51.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    owner: prometheus
    remote_src: yes
  loop: [prometheus, promtool]

- name: "Prometheus 設定・データディレクトリの準備"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop: [/etc/prometheus, /var/lib/prometheus]

- name: "Prometheus 設定ファイルの配置"
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart prometheus

- name: "Prometheus Systemdユニットの配置"
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
  notify: restart prometheus

# -----------------------------------------------------
# 2. Grafana の導入 (Repo Install)
# -----------------------------------------------------
- name: "Grafana 公式リポジトリの追加"
  ansible.builtin.yum_repository:
    name: grafana
    description: "Grafana Official Repo"
    baseurl: "https://rpm.grafana.com"
    gpgcheck: yes
    gpgkey: "https://rpm.grafana.com/gpg.key"

- name: "Grafana のインストール"
  ansible.builtin.dnf:
    name: grafana
    state: present

# -----------------------------------------------------
# 3. Discord 通知ボットのセットアップ (Systemd 方式)
# -----------------------------------------------------
- name: "ボットに必要な Python ライブラリ (requests) のインストール"
  ansible.builtin.dnf:
    name: python3-requests
    state: present

- name: "Discord ボットのスクリプト配置"
  ansible.builtin.template:
    src: discord_bot.py.j2
    dest: /usr/local/bin/discord_bot.py
    mode: '0755'

- name: "Discord ボットの Systemd ユニット配置"
  ansible.builtin.template:
    src: discord_bot.service.j2
    dest: /etc/systemd/system/discord_bot.service
    mode: '0644'

# -----------------------------------------------------
# 4. サービスの起動とファイアウォール
# -----------------------------------------------------
- name: "全監視サービスの起動と有効化"
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: yes
  loop:
    - prometheus
    - grafana-server
    - discord_bot

- name: "監視用ポートの開放 (Firewalld)"
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: ["9090/tcp", "3000/tcp"]