---
# =================================================================
# 卒業制作 インフラ構築自動化 監視環境役割定義 (roles/monitor/tasks/main.yml)
# =================================================================

# -----------------------------------------------------
# 0. 過去のSystemd（OS Native版）のクリーンアップ・競合防止
# -----------------------------------------------------
- name: "古いNative版のサービスが起動している場合は停止・無効化"
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - prometheus
    - grafana-server
    - discord_bot
  failed_when: false # サービスが存在しなくてもエラーにせず進む

# -----------------------------------------------------
# 1. 永続化ディレクトリの準備
# -----------------------------------------------------
- name: "永続化用ディレクトリの作成（所有権・SELinux適正化）"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: '0755'
    setype: container_file_t  # AlmaLinux 9のSELinuxによるコンテナ拒否を根底から防止
  loop:
    - { path: '/etc/prometheus', owner: 'root', group: 'root' }
    - { path: '/var/lib/prometheus', owner: '65534', group: '65534' }  # Prometheus(nobody)専用権限
    - { path: '/var/lib/noc_reports', owner: 'root', group: 'root' }   # NOCレポート保存用
    # 💡 危険だったホストOS側の「/var/lib/grafana」の手動作成タスクを完全に排除！

# -----------------------------------------------------
# 2. 設定ファイルの配布
# -----------------------------------------------------
- name: "Prometheus 設定ファイルの配置"
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: '0644'
  register: prom_config

- name: "NOC Bot ソースコードの配布"
  ansible.builtin.copy:
    src: noc_bot/
    dest: /opt/noc-integrated-bot/
    mode: '0644'
  register: noc_code_update

# -----------------------------------------------------
# 3. 監視・通知コンテナイメージの事前取得（耐障害性の向上）
# -----------------------------------------------------
- name: "Prometheusイメージの事前取得（冪等性の担保）"
  community.docker.docker_image:
    name: "prom/prometheus"
    tag: "v2.51.0"
    source: pull
    state: present
  async: 180
  poll: 5
  register: prom_pull_result
  until: prom_pull_result is success
  retries: 3
  delay: 5

- name: "Grafanaイメージの事前取得（冪等性の担保）"
  community.docker.docker_image:
    name: "grafana/grafana-oss"
    tag: "latest"
    source: pull
    state: present
  async: 240
  poll: 5
  register: graf_pull_result
  until: graf_pull_result is success
  retries: 3
  delay: 5

# -----------------------------------------------------
# 4. 監視・通知コンテナのデプロイ (Docker)
# -----------------------------------------------------
- name: "Prometheus コンテナの起動"
  community.docker.docker_container:
    name: prometheus
    image: prom/prometheus:v2.51.0
    state: started
    restart_policy: unless-stopped
    recreate: "{{ prom_config.changed }}"
    ports:
      - "9090:9090"  
    volumes:
      - /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - /var/lib/prometheus:/prometheus:Z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

# 💡 【環境差の完全吸収】Dockerが本番・シミュレーション問わず最適な権限で管理する「名前付きボリューム」を定義
- name: "Grafana用名前付きボリュームの作成"
  community.docker.docker_volume:
    name: grafana_data
    state: present

- name: "Grafana コンテナの起動"
  community.docker.docker_container:
    name: grafana
    image: grafana/grafana-oss:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "3000:3000"
    # 💡 ホストOSの絶対パスではなく、名前付きボリュームをマウント。
    # これにより、本番環境に古いデータや不適切なパーミッションがあっても完全に隔離・安全に起動します。
    volumes:
      - grafana_data:/var/lib/grafana:Z

# 専用モジュールを使い、ソースコードからローカルイメージをビルド
- name: "NOC統合コンテナイメージのローカルビルド"
  community.docker.docker_image:
    name: noc-integrated-bot
    tag: latest
    build:
      path: /opt/noc-integrated-bot/
      rm: yes
    source: build
    force_source: "{{ noc_code_update.changed }}"

# ビルドされたイメージを安全にコンテナとして起動
- name: "NOC統合コンテナの起動"
  community.docker.docker_container:
    name: noc-integrated-bot
    image: noc-integrated-bot:latest
    state: started
    recreate: "{{ noc_code_update.changed }}"
    restart_policy: unless-stopped
    memory: 512M
    cpus: 0.5
    volumes:
      - /var/lib/noc_reports:/app/reports:Z
    env:
      PROMETHEUS_URL: "{{ prometheus_endpoint | default('http://localhost:9090') }}"
      DISCORD_WEBHOOK_URL: "{{ vault_discord_webhook_url }}"
      REPORT_TIME: "{{ noc_report_schedule | default('09:00') }}"
      TZ: "Asia/Tokyo"

# -----------------------------------------------------
# 5. セキュリティ設定 (Firewalld)
# -----------------------------------------------------
- name: "監視・通知サービスのポート制御"
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "9090/tcp" # Prometheus
    - "3000/tcp" # Grafana