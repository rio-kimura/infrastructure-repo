---
# -----------------------------------------------------
# 1. スワップ領域 & 時刻同期 (リソース安定化)
# -----------------------------------------------------
- name: "スワップファイルの作成プロセス"
  block:
    - name: "スワップファイルの存在確認"
      ansible.builtin.stat:
        path: /swapfile
      register: swap_stat

    - name: "スワップファイルの生成"
      ansible.builtin.command:
        cmd: "fallocate -l {{ common_swap_size_mb | default(2048) }}M /swapfile"
      when: not swap_stat.stat.exists
      register: fallocate_result
      ignore_errors: yes

    - name: "スワップファイルの生成(ddフォールバック)"
      ansible.builtin.command:
        cmd: "dd if=/dev/zero of=/swapfile bs=1M count={{ common_swap_size_mb | default(2048) }}"
      when: 
        - not swap_stat.stat.exists
        - (fallocate_result is failed or fallocate_result is skipped)

- name: "スワップの権限と永続化"
  block:
    - name: "権限設定"
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'
        state: file
    - name: "有効化とマウント設定"
      ansible.posix.mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

- name: "Chrony(時刻同期)の設定"
  block:
    - name: "Chronyインストール"
      ansible.builtin.dnf:
        name: chrony
        state: present
    - name: "サービス起動"
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

# -----------------------------------------------------
# 2. Node Exporter の導入 (監視基盤)
# -----------------------------------------------------
- name: "Node Exporter 実行ユーザーの作成"
  ansible.builtin.user:
    name: node_exporter
    shell: /sbin/nologin
    system: yes
    create_home: no

- name: "Node Exporter バイナリのダウンロードと展開"
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: "/tmp/node_exporter-1.8.1.linux-amd64/node_exporter"

- name: "バイナリの配置"
  ansible.builtin.copy:
    src: "/tmp/node_exporter-1.8.1.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: yes

- name: "Node Exporter systemdユニットファイルの作成"
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter

      [Install]
      WantedBy=multi-user.target
    mode: '0644'

- name: "Node Exporter サービスの起動と有効化"
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true