---
# =====================================================
# 全台共通の設定値 (Global Variables)
# =====================================================

# 1. セキュリティ設定
# SSHポートを標準の22から変更（要塞化）
common_ssh_port: 2222

# 2. リソース・安定化設定
# 1GBメモリ環境での「Killed」エラーを防ぐための命綱（2GB確保）
common_swap_size_mb: 2048

# 3. 時刻同期設定
# 日本標準時(JST)に合わせるための国内NTPサーバー
common_ntp_server: "ntp.nict.jp"

# 4. 外部連携・機密情報
# Discord通知用Webhook URL（Ansible Vaultにより暗号化済み）
